name: Build QA Docker Images

permissions:
  contents: read
  id-token: write
  actions: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      liquibaseBranch:
        description: "Liquibase branch to build from (e.g., main, feature-branch)"
        required: true
        type: string
        default: "main"
      buildTargets:
        description: "Select which Docker images to build"
        required: true
        type: choice
        options:
          - "All (Community + Alpine + Secure)"
          - "Community Only (Standard + Alpine)"
          - "Secure Only"
          - "Standard Community Only"
          - "Alpine Community Only"
        default: "All (Community + Alpine + Secure)"
      secure-version:
        description: "Secure version to use for 'Secure Only' builds (e.g., 5.0.0-RC10). When set, downloads from S3 instead of building from branch."
        required: false
        type: string

jobs:
  # ============================================
  # DETECT RC BUILD
  # ============================================
  set-matrix:
    name: "Detect RC Build"
    runs-on: ubuntu-latest
    outputs:
      is_rc_build: ${{ steps.set-matrix.outputs.is_rc_build }}
    steps:
      - name: Detect RC build and log selected targets
        id: set-matrix
        run: |
          # Determine if this is an RC build (secure-version contains "-RC")
          IS_RC_BUILD="false"
          if [[ -n "${{ inputs.secure-version }}" && "${{ inputs.secure-version }}" =~ -RC[0-9]+$ ]]; then
            IS_RC_BUILD="true"
            echo "Detected RC build with version: ${{ inputs.secure-version }}"
          fi

          echo "Selected build targets: ${{ inputs.buildTargets }}"
          echo "Is RC build: $IS_RC_BUILD"
          echo "is_rc_build=${IS_RC_BUILD}" >> "$GITHUB_OUTPUT"

  # ============================================
  # BUILD: community (Dockerfile)
  # ============================================
  build-qa-community:
    name: Build Community QA
    needs: set-matrix
    if: ${{ contains(fromJSON('["All (Community + Alpine + Secure)","Community Only (Standard + Alpine)","Standard Community Only"]'), inputs.buildTargets) }}
    uses: liquibase/build-logic/.github/workflows/reusable-docker-build-qa.yml@dat-22876-reusables
    with:
      image_name: liquibase-qa
      dockerfile_path: Dockerfile
      suffix: ""
      ghcr_name: community
      branch_name: ${{ inputs.liquibaseBranch }}
      secure_version: ${{ inputs.secure-version || '' }}
      build_type: Community
      is_rc: "false"
      push_nexus: true
      push_ghcr: true
      build_logic_ref: dat-22876-reusables
    secrets: inherit

  # ============================================
  # BUILD: alpine (Dockerfile.alpine)
  # ============================================
  build-qa-alpine:
    name: Build Alpine QA
    needs: set-matrix
    if: ${{ contains(fromJSON('["All (Community + Alpine + Secure)","Community Only (Standard + Alpine)","Alpine Community Only"]'), inputs.buildTargets) }}
    uses: liquibase/build-logic/.github/workflows/reusable-docker-build-qa.yml@dat-22876-reusables
    with:
      image_name: liquibase-qa-alpine
      dockerfile_path: Dockerfile.alpine
      suffix: "-alpine"
      ghcr_name: alpine
      branch_name: ${{ inputs.liquibaseBranch }}
      secure_version: ${{ inputs.secure-version || '' }}
      build_type: Community
      is_rc: "false"
      push_nexus: true
      push_ghcr: true
      build_logic_ref: dat-22876-reusables
    secrets: inherit

  # ============================================
  # BUILD: secure (DockerfileSecure)
  # ============================================
  build-qa-secure:
    name: Build Secure QA
    needs: set-matrix
    if: ${{ contains(fromJSON('["All (Community + Alpine + Secure)","Secure Only"]'), inputs.buildTargets) }}
    uses: liquibase/build-logic/.github/workflows/reusable-docker-build-qa.yml@dat-22876-reusables
    with:
      image_name: ${{ needs.set-matrix.outputs.is_rc_build == 'true' && 'liquibase-secure-rc' || 'liquibase-secure-qa' }}
      dockerfile_path: DockerfileSecure
      suffix: "-secure"
      ghcr_name: secure
      branch_name: ${{ inputs.liquibaseBranch }}
      secure_version: ${{ inputs.secure-version || '' }}
      build_type: secure
      is_rc: ${{ needs.set-matrix.outputs.is_rc_build }}
      push_nexus: true
      push_ghcr: true
      build_logic_ref: dat-22876-reusables
    secrets: inherit

  # ============================================
  # SCAN: community
  # ============================================
  vuln-scan-community:
    name: Scan Community QA
    needs: [build-qa-community]
    if: ${{ !cancelled() && needs.build-qa-community.result == 'success' }}
    uses: liquibase/build-logic/.github/workflows/reusable-vulnerability-scan.yml@main
    with:
      mode: docker
      source: ghcr.io/${{ github.repository }}/liquibase-community:${{ github.sha }}
      image_name: liquibase-qa
      image_tag: qa
      fail_on_vulnerabilities: true
      upload_sarif: false
      generate_sbom: true
      build_logic_ref: main
    secrets: inherit

  # ============================================
  # SCAN: alpine
  # ============================================
  vuln-scan-alpine:
    name: Scan Alpine QA
    needs: [build-qa-alpine]
    if: ${{ !cancelled() && needs.build-qa-alpine.result == 'success' }}
    uses: liquibase/build-logic/.github/workflows/reusable-vulnerability-scan.yml@main
    with:
      mode: docker
      source: ghcr.io/${{ github.repository }}/liquibase-alpine:${{ github.sha }}
      image_name: liquibase-qa-alpine
      image_tag: qa
      fail_on_vulnerabilities: true
      upload_sarif: false
      generate_sbom: true
      build_logic_ref: main
    secrets: inherit

  # ============================================
  # SCAN: secure
  # ============================================
  vuln-scan-secure:
    name: Scan Secure QA
    needs: [set-matrix, build-qa-secure]
    if: ${{ !cancelled() && needs.build-qa-secure.result == 'success' }}
    uses: liquibase/build-logic/.github/workflows/reusable-vulnerability-scan.yml@main
    with:
      mode: docker
      source: ghcr.io/${{ github.repository }}/liquibase-secure:${{ github.sha }}
      image_name: ${{ needs.set-matrix.outputs.is_rc_build == 'true' && 'liquibase-secure-rc' || 'liquibase-secure-qa' }}
      image_tag: qa
      fail_on_vulnerabilities: true
      upload_sarif: false
      generate_sbom: true
      build_logic_ref: main
    secrets: inherit

  # ============================================
  # CLEANUP: community
  # ============================================
  cleanup-ghcr-community:
    name: Cleanup Community GHCR
    needs: [vuln-scan-community]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete GHCR image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          PACKAGE_NAME="${REPO_NAME}/liquibase-community"
          ENCODED_PACKAGE_NAME="${REPO_NAME}%2Fliquibase-community"
          TAG="${{ github.sha }}"
          VERSION_ID=$(gh api \
            "/orgs/${{ github.repository_owner }}/packages/container/${ENCODED_PACKAGE_NAME}/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"${TAG}\") | .id" 2>/dev/null || echo "")
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE \
              "/orgs/${{ github.repository_owner }}/packages/container/${ENCODED_PACKAGE_NAME}/versions/${VERSION_ID}"
            echo "Deleted ${PACKAGE_NAME}:${TAG}"
          else
            echo "No version found for ${PACKAGE_NAME}:${TAG}, skipping"
          fi

  # ============================================
  # CLEANUP: alpine
  # ============================================
  cleanup-ghcr-alpine:
    name: Cleanup Alpine GHCR
    needs: [vuln-scan-alpine]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete GHCR image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          PACKAGE_NAME="${REPO_NAME}/liquibase-alpine"
          ENCODED_PACKAGE_NAME="${REPO_NAME}%2Fliquibase-alpine"
          TAG="${{ github.sha }}"
          VERSION_ID=$(gh api \
            "/orgs/${{ github.repository_owner }}/packages/container/${ENCODED_PACKAGE_NAME}/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"${TAG}\") | .id" 2>/dev/null || echo "")
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE \
              "/orgs/${{ github.repository_owner }}/packages/container/${ENCODED_PACKAGE_NAME}/versions/${VERSION_ID}"
            echo "Deleted ${PACKAGE_NAME}:${TAG}"
          else
            echo "No version found for ${PACKAGE_NAME}:${TAG}, skipping"
          fi

  # ============================================
  # CLEANUP: secure
  # ============================================
  cleanup-ghcr-secure:
    name: Cleanup Secure GHCR
    needs: [vuln-scan-secure]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete GHCR image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          PACKAGE_NAME="${REPO_NAME}/liquibase-secure"
          ENCODED_PACKAGE_NAME="${REPO_NAME}%2Fliquibase-secure"
          TAG="${{ github.sha }}"
          VERSION_ID=$(gh api \
            "/orgs/${{ github.repository_owner }}/packages/container/${ENCODED_PACKAGE_NAME}/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"${TAG}\") | .id" 2>/dev/null || echo "")
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE \
              "/orgs/${{ github.repository_owner }}/packages/container/${ENCODED_PACKAGE_NAME}/versions/${VERSION_ID}"
            echo "Deleted ${PACKAGE_NAME}:${TAG}"
          else
            echo "No version found for ${PACKAGE_NAME}:${TAG}, skipping"
          fi
