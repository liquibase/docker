# separate terms of service, privacy policy, and support
# documentation.

name: Vulnerability Scanning

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile*"
      - "docker-entrypoint.sh"
      - ".github/workflows/trivy.yml"
      - "examples/**"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "Dockerfile*"
      - "docker-entrypoint.sh"
      - ".github/workflows/trivy.yml"
      - "examples/**"
      - "pom.xml"
  schedule:
    - cron: "0 7 * * 1-5" # Run every weekday at 7am UTC

permissions:
  contents: read
  id-token: write # Required for AWS OIDC authentication
  packages: write # Required for pushing to GHCR
  security-events: write # Required for uploading SARIF results to GitHub Security tab
  actions: read # Required for private repositories to get Action run status
  pull-requests: write # Required for writing comments on pull requests

jobs:
  # ============================================
  # SCAN: community (Dockerfile)
  # ============================================
  scan-community:
    name: Scan liquibase/liquibase
    uses: liquibase/build-logic/.github/workflows/reusable-docker-scan.yml@dat-22876-reusables
    with:
      dockerfile_path: Dockerfile
      image_name: liquibase/liquibase
      suffix: ""
      vex_enabled: false
      upload_sarif: true
      dispatch_new_cves: true
      scout_enabled: true
      build_logic_ref: dat-22876-reusables
    secrets: inherit

  # ============================================
  # SCAN: alpine (Dockerfile.alpine)
  # ============================================
  scan-alpine:
    name: Scan liquibase/liquibase-alpine
    uses: liquibase/build-logic/.github/workflows/reusable-docker-scan.yml@dat-22876-reusables
    with:
      dockerfile_path: Dockerfile.alpine
      image_name: liquibase/liquibase
      suffix: "-alpine"
      vex_enabled: false
      upload_sarif: true
      dispatch_new_cves: true
      scout_enabled: true
      build_logic_ref: dat-22876-reusables
    secrets: inherit

  # ============================================
  # SCAN: secure (DockerfileSecure) — VEX enabled
  # ============================================
  scan-secure:
    name: Scan liquibase/liquibase-secure
    uses: liquibase/build-logic/.github/workflows/reusable-docker-scan.yml@dat-22876-reusables
    with:
      dockerfile_path: DockerfileSecure
      image_name: liquibase/liquibase-secure
      suffix: ""
      vex_enabled: true
      upload_sarif: true
      dispatch_new_cves: true
      scout_enabled: true
      build_logic_ref: dat-22876-reusables
    secrets: inherit

  # ============================================
  # PERSIST SCAN RESULTS TO scan-results BRANCH
  # ============================================
  persist-results:
    name: Persist Scan Results
    needs: [scan-community, scan-alpine, scan-secure]
    if: always() && github.event_name != 'pull_request' && needs.scan-community.result != 'cancelled'
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download vulnerability report artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: scan-artifacts
          pattern: vulnerability-report-*

      - name: Download Scout JSON artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: scout-artifacts
          pattern: scout-results*
        continue-on-error: true

      - name: Merge Scout JSON into vulnerability report directories
        run: |
          # Map scout artifact suffix to matching vulnerability-report artifact name.
          # The reusable-vulnerability-scan.yml uses image_tag = suffix || 'latest',
          # so the alpine image_tag is "-alpine" (leading dash) producing a double dash.
          # scout-results         -> vulnerability-report-liquibase-liquibase-latest
          # scout-results-alpine  -> vulnerability-report-liquibase-liquibase--alpine
          # scout-results-secure  -> vulnerability-report-liquibase-liquibase-secure-latest
          declare -A SCOUT_TO_VULN=(
            ["scout-results"]="vulnerability-report-liquibase-liquibase-latest"
            ["scout-results-alpine"]="vulnerability-report-liquibase-liquibase--alpine"
            ["scout-results-secure"]="vulnerability-report-liquibase-liquibase-secure-latest"
          )

          for SCOUT_DIR in scout-artifacts/scout-results*/; do
            [ -d "$SCOUT_DIR" ] || continue
            SCOUT_NAME=$(basename "$SCOUT_DIR")
            VULN_NAME="${SCOUT_TO_VULN[$SCOUT_NAME]:-}"
            if [ -z "$VULN_NAME" ]; then
              echo "WARNING: no mapping for $SCOUT_NAME — skipping"
              continue
            fi
            VULN_DIR="scan-artifacts/$VULN_NAME"
            if [ -d "$VULN_DIR" ] && [ -f "$SCOUT_DIR/scout-results.json" ]; then
              cp "$SCOUT_DIR/scout-results.json" "$VULN_DIR/scout-results.json"
              echo "Merged scout-results.json into $VULN_NAME"
            fi
          done

      - name: Persist to scan-results branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          scripts/persist-scan-results.sh scan-artifacts

  # ============================================
  # SLACK NOTIFICATION ON FAILURE
  # ============================================
  notify-failure:
    needs: [scan-community, scan-alpine, scan-secure]
    if: failure()
    runs-on: "ubuntu-22.04"
    steps:
      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Notify Slack on Build Failure
        uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
        env:
          SLACK_COLOR: "failure"
          SLACK_MESSAGE: "View details on GitHub Actions: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}. Triggered by repository: ${{ github.repository }}"
          SLACK_TITLE: "❌ ${{ github.repository }} ❌ Trivy failed on branch ${{ github.ref_name }} for commit ${{ github.sha }} in repository ${{ github.repository }}"
          SLACK_USERNAME: liquibot
          SLACK_WEBHOOK: ${{ env.DOCKER_SLACK_WEBHOOK_URL }}
          SLACK_ICON_EMOJI: ":whale:"
          SLACK_FOOTER: "${{ github.repository }}"
          SLACK_LINK_NAMES: true
