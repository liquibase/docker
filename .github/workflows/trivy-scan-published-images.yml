# Vulnerability scanning for published Docker images
# This workflow scans published images on Docker Hub for vulnerabilities
# using the reusable vulnerability scanning workflow from build-logic.
#
# NOTE: SARIF results are NOT uploaded to GitHub Security tab to avoid stale alerts.
# Published image vulnerabilities are tracked via workflow artifacts and GitHub Actions summary.
# Only the main branch workflow (trivy.yml) populates the Security tab.

name: Published Images Vulnerability Scanning

on:
  workflow_dispatch:
    inputs:
      max_tags_to_scan:
        description: "Maximum number of published tags to scan"
        required: false
        default: "20"
  schedule:
    # Run Monday-Friday at 10 AM UTC (published image monitoring)
    - cron: "0 10 * * 1-5"

permissions:
  contents: read
  actions: read
  id-token: write       # Required for AWS OIDC authentication in reusable vulnerability scan
  packages: read        # Required: reusable vulnerability-scan pulls images from GHCR
  security-events: write # Required: reusable declares this at job level unconditionally

jobs:
  generate-matrix:
    name: Generate Scan Matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    env:
      MAX_TAGS: ${{ github.event.inputs.max_tags_to_scan || '10' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate matrix for all image/tag combinations
        id: set-matrix
        run: |
          scripts/generate-dockerhub-matrix.sh

  vulnerability-scan:
    name: Scan ${{ matrix.image }}:${{ matrix.tag }}
    needs: generate-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    uses: liquibase/build-logic/.github/workflows/reusable-vulnerability-scan.yml@main
    with:
      mode: docker
      source: "${{ matrix.image }}:${{ matrix.tag }}"
      image_name: ${{ matrix.image }}
      image_tag: ${{ matrix.tag }}
      fail_on_vulnerabilities: false
      upload_sarif: false
      generate_sbom: true
      vex_enabled: ${{ contains(matrix.image, 'liquibase-secure') }}
      build_logic_ref: main
    secrets: inherit

  persist-results:
    name: Persist Scan Results
    needs: [generate-matrix, vulnerability-scan]
    if: always() && needs.vulnerability-scan.result != 'cancelled'
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Checkout build-logic
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: liquibase/build-logic
          path: build-logic

      - name: Download all scan artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: scan-artifacts
          pattern: vulnerability-report-*

      - name: Persist to scan-results branch
        env:
          EXPECTED_MATRIX: ${{ needs.generate-matrix.outputs.matrix }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          scripts/persist-scan-results.sh scan-artifacts

      - name: Configure AWS credentials for vault access (CVE dispatch)
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1
        continue-on-error: true

      - name: Get secrets from vault (CVE dispatch)
        id: vault-secrets-cve
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true
        continue-on-error: true

      - name: Get GitHub App token for liquibase-pro (CVE dispatch)
        id: get-token-cve
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: liquibase
          repositories: liquibase-pro
          permission-actions: write
          permission-contents: read
        continue-on-error: true

      - name: Dispatch new CVEs for investigation
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.get-token-cve.outputs.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EXPECTED_MATRIX: ${{ needs.generate-matrix.outputs.matrix }}
        run: |
          set +e  # Never fail the parent workflow

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::CVE dispatch skipped -- GitHub App token unavailable (vault step may have failed)"
            echo "## CVE Investigation Dispatch (published images)" >> "$GITHUB_STEP_SUMMARY"
            echo "Skipped -- GitHub App token unavailable." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          chmod +x build-logic/scripts/vulnerability-scanning/diff-new-cves.sh

          echo "## CVE Investigation Dispatch (published images)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          TOTAL_BATCHES=0
          TOTAL_FAILED=0
          TOTAL_DEDUPED=0

          # Track CVE IDs already dispatched across all tags to avoid flooding
          # the investigate-cve workflow with duplicate CVEs from different tags
          DISPATCHED_CVES_FILE=$(mktemp)

          # Derive image:tag from the matrix JSON directly (avoids fragile artifact-name parsing)
          ENTRY_COUNT=$(echo "$EXPECTED_MATRIX" | jq '.include | length')

          for (( idx=0; idx<ENTRY_COUNT; idx++ )); do
            IMAGE_NAME=$(echo "$EXPECTED_MATRIX" | jq -r ".include[$idx].image")
            IMAGE_TAG=$(echo "$EXPECTED_MATRIX" | jq -r ".include[$idx].tag")
            IMAGE_OR_VERSION="${IMAGE_NAME}:${IMAGE_TAG}"

            # Reconstruct artifact directory name (same convention as the reusable workflow)
            SAFE_NAME=$(echo "$IMAGE_NAME" | tr '/' '-')
            SAFE_TAG=$(echo "$IMAGE_TAG" | tr '/' '-')
            ARTIFACT_DIR="scan-artifacts/vulnerability-report-${SAFE_NAME}-${SAFE_TAG}"

            if [ ! -d "$ARTIFACT_DIR" ] || [ -z "$(ls -A "$ARTIFACT_DIR" 2>/dev/null)" ]; then
              echo "::warning::No scan artifacts for ${IMAGE_OR_VERSION} -- skipping CVE dispatch"
              echo "- **${IMAGE_OR_VERSION}**: no scan artifacts found" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            echo "Diffing CVEs for ${IMAGE_OR_VERSION}..."

            BATCHES=$(build-logic/scripts/vulnerability-scanning/diff-new-cves.sh \
              --scan-dir   "$ARTIFACT_DIR" \
              --source     docker \
              --image-or-version "$IMAGE_OR_VERSION" \
              --run-url    "$RUN_URL" \
              2>/tmp/diff-err-$$.txt) || {
              ERR=$(cat /tmp/diff-err-$$.txt 2>/dev/null || echo "unknown error")
              echo "::warning::diff-new-cves.sh failed for ${IMAGE_OR_VERSION}: $ERR"
              echo "- **${IMAGE_OR_VERSION}**: diff failed -- $ERR" >> "$GITHUB_STEP_SUMMARY"
              rm -f "/tmp/diff-err-$$.txt"
              continue
            }
            rm -f "/tmp/diff-err-$$.txt"

            if [ -z "$BATCHES" ]; then
              echo "No unassessed CVEs for ${IMAGE_OR_VERSION} -- skipping"
              echo "- **${IMAGE_OR_VERSION}**: no unassessed CVEs" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            BATCH_NUM=0
            FAILED=0

            while IFS= read -r batch_json; do
              [ -z "$batch_json" ] && continue

              # Deduplicate: remove CVEs already dispatched from a previous tag
              NEW_CVES=$(echo "$batch_json" | jq -c --slurpfile seen "$DISPATCHED_CVES_FILE" '
                ($seen | if length > 0 then .[0] else [] end) as $already |
                .cves |= [.[] | select(.id as $id | $already | index($id) | not)]
              ' 2>/dev/null || echo "$batch_json")

              NEW_COUNT=$(echo "$NEW_CVES" | jq '.cves | length' 2>/dev/null || echo 0)
              ORIG_COUNT=$(echo "$batch_json" | jq '.cves | length' 2>/dev/null || echo 0)
              SKIPPED=$((ORIG_COUNT - NEW_COUNT))

              if [ "$SKIPPED" -gt 0 ]; then
                TOTAL_DEDUPED=$((TOTAL_DEDUPED + SKIPPED))
                echo "  Deduped $SKIPPED CVE(s) already dispatched from previous tag"
              fi

              if [ "$NEW_COUNT" -eq 0 ]; then
                echo "- **${IMAGE_OR_VERSION}**: all CVEs already dispatched from previous tag" >> "$GITHUB_STEP_SUMMARY"
                continue
              fi

              BATCH_NUM=$((BATCH_NUM + 1))

              if gh workflow run investigate-cve.lock.yml \
                  -R liquibase/liquibase-pro \
                  -f "cve_json=$NEW_CVES" 2>/tmp/dispatch-err-$$.txt; then
                echo "- **${IMAGE_OR_VERSION}** batch $BATCH_NUM: dispatched $NEW_COUNT CVEs" >> "$GITHUB_STEP_SUMMARY"
                # Record dispatched CVE IDs
                echo "$NEW_CVES" | jq -r '.cves[].id' >> "$DISPATCHED_CVES_FILE.ids"
                # Rebuild JSON array for jq --slurpfile
                if [ -f "$DISPATCHED_CVES_FILE.ids" ]; then
                  sort -u "$DISPATCHED_CVES_FILE.ids" | jq -R . | jq -s . > "$DISPATCHED_CVES_FILE"
                fi
              else
                ERR=$(cat /tmp/dispatch-err-$$.txt 2>/dev/null || echo "unknown error")
                echo "::warning::CVE dispatch failed for ${IMAGE_OR_VERSION} batch $BATCH_NUM: $ERR"
                echo "- **${IMAGE_OR_VERSION}** batch $BATCH_NUM: FAILED -- $ERR" >> "$GITHUB_STEP_SUMMARY"
                FAILED=$((FAILED + 1))
              fi
              rm -f "/tmp/dispatch-err-$$.txt"
            done <<< "$BATCHES"

            TOTAL_BATCHES=$((TOTAL_BATCHES + BATCH_NUM))
            TOTAL_FAILED=$((TOTAL_FAILED + FAILED))
          done

          rm -f "$DISPATCHED_CVES_FILE" "$DISPATCHED_CVES_FILE.ids"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total dispatched**: $TOTAL_BATCHES batch(es), $TOTAL_FAILED failure(s)" >> "$GITHUB_STEP_SUMMARY"
          echo "CVE dispatch complete: $TOTAL_BATCHES batch(es), $TOTAL_FAILED failure(s)"
          exit 0  # Never fail the parent workflow
