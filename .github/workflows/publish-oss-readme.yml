name: Publish Liquibase Community README to Docker Hub

on:
  push:
    paths:
      - "README.md"
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview README push without updating Docker Hub (for validation runs)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  update-readme:
    uses: liquibase/build-logic/.github/workflows/reusable-docker-readme.yml@main
    with:
      target_image: liquibase/liquibase
      readme_path: README.md
      short_description: "Liquibase Community"
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit
