name: Release Extension (v2)

permissions:
  contents: write
  pull-requests: write
  id-token: write
  packages: write

on:
  repository_dispatch:
    types: [liquibase-release, liquibase-secure-release]
  workflow_dispatch:
    inputs:
      releaseType:
        description: "Release Type"
        required: true
        default: liquibase-release
        type: choice
        options:
          - liquibase-release
          - liquibase-secure-release
      liquibaseVersion:
        description: "Liquibase Version"
        required: true
      extensionVersion:
        description: "Container Version (Defaults to Liquibase Version)"
        required: false
      dryRun:
        description: "Dry Run release"
        required: true
        type: boolean
        default: false
      distinct_id:
        description: "Only needed for liquibase dispatch"
        required: false
        type: string
        default: ""
      pushDockerHub:
        description: "Publish to Docker Hub"
        type: boolean
        default: true
      pushGHCR:
        description: "Publish to GitHub Container Registry"
        type: boolean
        default: true
      pushECR:
        description: "Publish to AWS Public ECR"
        type: boolean
        default: true

jobs:
  update-dockerfiles:
    name: "Update Dockerfiles"
    runs-on: ubuntu-latest
    outputs:
      releaseType: ${{ steps.collect-data.outputs.releaseType }}
      liquibaseVersion: ${{ steps.collect-data.outputs.liquibaseVersion }}
      extensionVersion: ${{ steps.collect-data.outputs.extensionVersion }}
      dryRun: ${{ steps.collect-data.outputs.dryRun }}
      minorVersion: ${{ steps.collect-data.outputs.minorVersion }}
      latestCommitSha: ${{ steps.get-latest-sha.outputs.latestCommitSha }}
      pushDockerHub: ${{ steps.collect-data.outputs.pushDockerHub }}
      pushGHCR: ${{ steps.collect-data.outputs.pushGHCR }}
      pushECR: ${{ steps.collect-data.outputs.pushECR }}
      changes_made: ${{ steps.update-dockerfiles.outputs.changes_made }}

    steps:
      - name: Collect Data
        id: collect-data
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            function getMinorVersion(version) {
              const arr = version.split(".");
              return `${arr[0]}.${arr[1]}`;
            }
            let eventType = context.eventName === 'workflow_dispatch' ? (context.payload.inputs.releaseType || 'liquibase-release') : (context.payload.action || context.payload.inputs?.releaseType || 'liquibase-release');
            let liquibaseVersion = null;
            let extensionVersion = null;
            let dryRun = false;
            let minorVersion = null;
            if (context.payload.client_payload) {
              eventType = context.payload.action || 'liquibase-release';
              liquibaseVersion = context.payload.client_payload.liquibaseVersion;
              dryRun = context.payload.client_payload.dryRun;
              minorVersion = getMinorVersion(liquibaseVersion);
              core.setOutput("liquibaseVersion", liquibaseVersion);
              core.setOutput("extensionVersion", liquibaseVersion);
              core.setOutput("minorVersion", minorVersion);
              core.setOutput("dryRun", dryRun);
              core.setOutput("releaseType", eventType);
              core.setOutput("pushDockerHub", context.payload.client_payload.pushDockerHub ?? true);
              core.setOutput("pushGHCR", context.payload.client_payload.pushGHCR ?? true);
              core.setOutput("pushECR", context.payload.client_payload.pushECR ?? true);
            } else if (context.payload.inputs) {
              eventType = context.payload.inputs.releaseType || 'liquibase-release';
              liquibaseVersion = context.payload.inputs.liquibaseVersion;
              dryRun = context.payload.inputs.dryRun;
              minorVersion = getMinorVersion(liquibaseVersion);
              core.setOutput("liquibaseVersion", liquibaseVersion);
              core.setOutput("extensionVersion", context.payload.inputs.extensionVersion || liquibaseVersion);
              core.setOutput("minorVersion", minorVersion);
              core.setOutput("dryRun", dryRun);
              core.setOutput("releaseType", eventType);
              core.setOutput("pushDockerHub", Boolean(context.payload.inputs?.pushDockerHub ?? true));
              core.setOutput("pushGHCR", Boolean(context.payload.inputs?.pushGHCR ?? true));
              core.setOutput("pushECR", Boolean(context.payload.inputs?.pushECR ?? true));
            } else {
              core.setFailed('Unknown event type');
            }

      - run: |
          echo "Release type: ${{ steps.collect-data.outputs.releaseType }}"
          echo "Liquibase version: ${{ steps.collect-data.outputs.liquibaseVersion }}"
          echo "Extension version: ${{ steps.collect-data.outputs.extensionVersion }}"
          echo "Dry run: ${{ steps.collect-data.outputs.dryRun }}"

      - name: Configure AWS credentials for vault access
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.LIQUIBASE_VAULT_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Get secrets from vault
        id: vault-secrets
        uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2.0.10
        with:
          secret-ids: |
            ,/vault/liquibase
          parse-json-secrets: true

      - name: Get GitHub App token
        id: get-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ env.LIQUIBASE_GITHUB_APP_ID }}
          private-key: ${{ env.LIQUIBASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          token: ${{ steps.get-token.outputs.token }}
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: "8"
          distribution: "adopt"

      - name: Configure git user
        run: |
          git config user.name "liquibase-workflows[bot]"
          git config user.email "1241802+liquibase-workflows[bot]@users.noreply.github.com"

      - name: Update Dockerfile(s) and commit changes
        id: update-dockerfiles
        run: |
          # First ensure we're up to date with remote
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}

          if [[ "${{ steps.collect-data.outputs.releaseType }}" == "liquibase-secure-release" ]]; then
            file_list=("DockerfileSecure")
            LIQUIBASE_SECURE_SHA=$(curl -LsS https://repo.liquibase.com/releases/secure/${{ steps.collect-data.outputs.liquibaseVersion }}/liquibase-secure-${{ steps.collect-data.outputs.liquibaseVersion }}.tar.gz | sha256sum | awk '{ print $1 }')
            for file in "${file_list[@]}"; do
              sed -i 's/^ARG LIQUIBASE_SECURE_VERSION=.*/ARG LIQUIBASE_SECURE_VERSION='"${{ steps.collect-data.outputs.liquibaseVersion }}"'/' "${{ github.workspace }}/${file}"
              sed -i 's/^ARG LB_SECURE_SHA256=.*/ARG LB_SECURE_SHA256='"$LIQUIBASE_SECURE_SHA"'/' "${{ github.workspace }}/${file}"
              git add "${file}"
            done
            if git diff-index --cached --quiet HEAD --; then
              echo "Nothing new to commit"
              echo "changes_made=false" >> $GITHUB_OUTPUT
            else
              COMMIT_MSG="Liquibase Secure Version Bumped to ${{ steps.collect-data.outputs.liquibaseVersion }}"
              git commit -m "${COMMIT_MSG}"
              echo "changes_made=true" >> $GITHUB_OUTPUT
            fi
          else
            file_list=("Dockerfile" "Dockerfile.alpine")
            LIQUIBASE_SHA=$(curl -LsS https://github.com/liquibase/liquibase/releases/download/v${{ steps.collect-data.outputs.liquibaseVersion }}/liquibase-${{ steps.collect-data.outputs.liquibaseVersion }}.tar.gz | sha256sum | awk '{ print $1 }')
            for file in "${file_list[@]}"; do
              sed -i 's/^ARG LIQUIBASE_VERSION=.*/ARG LIQUIBASE_VERSION='"${{ steps.collect-data.outputs.liquibaseVersion }}"'/' "${{ github.workspace }}/${file}"
              sed -i 's/^ARG LB_SHA256=.*/ARG LB_SHA256='"$LIQUIBASE_SHA"'/' "${{ github.workspace }}/${file}"
              git add "${file}"
            done
            if git diff-index --cached --quiet HEAD --; then
              echo "Nothing new to commit"
              echo "changes_made=false" >> $GITHUB_OUTPUT
            else
              COMMIT_MSG="Liquibase Version Bumped to ${{ steps.collect-data.outputs.extensionVersion }}"
              git commit -m "${COMMIT_MSG}"
              echo "changes_made=true" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Create and Push Tag
        id: create-tag
        if: ${{ steps.update-dockerfiles.outputs.changes_made == 'true' && steps.collect-data.outputs.dryRun == 'false' }}
        run: |
          VERSION="${{ steps.collect-data.outputs.liquibaseVersion }}"
          EXTENSION_VERSION="${{ steps.collect-data.outputs.extensionVersion }}"
          RELEASE_TYPE="${{ steps.collect-data.outputs.releaseType }}"

          if [[ "${RELEASE_TYPE}" == "liquibase-secure-release" ]]; then
            TAG_NAME="v${VERSION}-SECURE"
            COMMIT_MSG="Liquibase Secure Version Bumped to ${VERSION}"
            TAG_MSG="Version Bumped to ${VERSION} Secure"
          else
            TAG_NAME="v${EXTENSION_VERSION}"
            COMMIT_MSG="Liquibase Version Bumped to ${EXTENSION_VERSION}"
            TAG_MSG="Version Bumped to ${EXTENSION_VERSION}"
          fi

          # Create and push new tag
          git tag -a -m "${TAG_MSG}" "${TAG_NAME}"
          # Push changes and tags using the token
          git remote set-url origin "https://x-access-token:${{ steps.get-token.outputs.token }}@github.com/$GITHUB_REPOSITORY.git"
          git push origin ${{ github.ref }} --tags
        env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}

      - name: Get latest commit SHA
        id: get-latest-sha
        run: echo "latestCommitSha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ============================================
  # BUILD AND PUSH: community (Dockerfile)
  # ============================================
  build-community:
    name: "Build liquibase/liquibase"
    needs: update-dockerfiles
    if: ${{ needs.update-dockerfiles.outputs.releaseType == 'liquibase-release' }}
    uses: liquibase/build-logic/.github/workflows/reusable-docker-build.yml@dat-22876-reusables
    with:
      dockerfile_path: Dockerfile
      image_name: liquibase/liquibase
      suffix: ""
      version: ${{ needs.update-dockerfiles.outputs.extensionVersion }}
      minor_version: ${{ needs.update-dockerfiles.outputs.minorVersion }}
      latest_tag: "latest"
      dockerhub_repo: liquibase/liquibase
      ghcr_repo: ghcr.io/liquibase/liquibase
      ecr_repo: public.ecr.aws/liquibase/liquibase
      push_dockerhub: ${{ needs.update-dockerfiles.outputs.pushDockerHub == 'true' }}
      push_ghcr: ${{ needs.update-dockerfiles.outputs.pushGHCR == 'true' }}
      push_ecr: ${{ needs.update-dockerfiles.outputs.pushECR == 'true' }}
      dry_run: ${{ needs.update-dockerfiles.outputs.dryRun == 'true' }}
      sign_with_cosign: false
      generate_sbom: false
      provenance_mode: "false"
      cosign_identity_regexp: ^https://github\.com/liquibase/docker/.*
      image_source_url: https://github.com/${{ github.repository }}
      image_description: "Liquibase Container Image"
      image_licenses: FSL-1.1-ALv2
      build_logic_ref: dat-22876-reusables
    secrets: inherit

  # ============================================
  # BUILD AND PUSH: alpine (Dockerfile.alpine)
  # ============================================
  build-alpine:
    name: "Build liquibase/liquibase-alpine"
    needs: update-dockerfiles
    if: ${{ needs.update-dockerfiles.outputs.releaseType == 'liquibase-release' }}
    uses: liquibase/build-logic/.github/workflows/reusable-docker-build.yml@dat-22876-reusables
    with:
      dockerfile_path: Dockerfile.alpine
      image_name: liquibase/liquibase
      suffix: "-alpine"
      version: ${{ needs.update-dockerfiles.outputs.extensionVersion }}
      minor_version: ${{ needs.update-dockerfiles.outputs.minorVersion }}
      latest_tag: "alpine"
      dockerhub_repo: liquibase/liquibase
      ghcr_repo: ghcr.io/liquibase/liquibase
      ecr_repo: public.ecr.aws/liquibase/liquibase
      push_dockerhub: ${{ needs.update-dockerfiles.outputs.pushDockerHub == 'true' }}
      push_ghcr: ${{ needs.update-dockerfiles.outputs.pushGHCR == 'true' }}
      push_ecr: ${{ needs.update-dockerfiles.outputs.pushECR == 'true' }}
      dry_run: ${{ needs.update-dockerfiles.outputs.dryRun == 'true' }}
      sign_with_cosign: false
      generate_sbom: false
      provenance_mode: "false"
      cosign_identity_regexp: ^https://github\.com/liquibase/docker/.*
      image_source_url: https://github.com/${{ github.repository }}
      image_description: "Liquibase Container Image (Alpine)"
      image_licenses: FSL-1.1-ALv2
      build_logic_ref: dat-22876-reusables
    secrets: inherit

  # ============================================
  # BUILD AND PUSH: secure (DockerfileSecure)
  # ============================================
  build-secure:
    name: "Build liquibase/liquibase-secure"
    needs: update-dockerfiles
    if: ${{ needs.update-dockerfiles.outputs.releaseType == 'liquibase-secure-release' }}
    uses: liquibase/build-logic/.github/workflows/reusable-docker-build.yml@dat-22876-reusables
    with:
      dockerfile_path: DockerfileSecure
      image_name: liquibase/liquibase-secure
      suffix: ""
      version: ${{ needs.update-dockerfiles.outputs.extensionVersion }}
      minor_version: ${{ needs.update-dockerfiles.outputs.minorVersion }}
      latest_tag: "latest"
      dockerhub_repo: liquibase/liquibase-secure
      ghcr_repo: ghcr.io/liquibase/liquibase-secure
      ecr_repo: public.ecr.aws/liquibase/liquibase-secure
      push_dockerhub: ${{ needs.update-dockerfiles.outputs.pushDockerHub == 'true' }}
      push_ghcr: ${{ needs.update-dockerfiles.outputs.pushGHCR == 'true' }}
      push_ecr: ${{ needs.update-dockerfiles.outputs.pushECR == 'true' }}
      dry_run: ${{ needs.update-dockerfiles.outputs.dryRun == 'true' }}
      sign_with_cosign: true
      generate_sbom: true
      provenance_mode: "mode=max"
      cosign_identity_regexp: ^https://github\.com/liquibase/docker/.*
      image_source_url: https://github.com/${{ github.repository }}
      image_description: "Liquibase Secure Container Image"
      image_licenses: LicenseRef-Liquibase-EULA
      image_licenses_url: https://www.liquibase.com/eula
      build_logic_ref: dat-22876-reusables
    secrets: inherit

  # ============================================
  # PUBLISH GITHUB RELEASE
  # ============================================
  publish-release:
    name: "Publish GitHub Release"
    needs: [update-dockerfiles, build-community, build-alpine, build-secure]
    if: |
      always() &&
      needs.update-dockerfiles.outputs.dryRun == 'false' &&
      needs.update-dockerfiles.outputs.changes_made == 'true' &&
      (
        (needs.update-dockerfiles.outputs.releaseType == 'liquibase-release' && needs.build-community.result == 'success' && needs.build-alpine.result == 'success') ||
        (needs.update-dockerfiles.outputs.releaseType == 'liquibase-secure-release' && needs.build-secure.result == 'success')
      )
    uses: liquibase/build-logic/.github/workflows/reusable-docker-publish.yml@dat-22876-reusables
    with:
      release_type: ${{ needs.update-dockerfiles.outputs.releaseType }}
      version: ${{ needs.update-dockerfiles.outputs.extensionVersion }}
      tag_suffix: ${{ needs.update-dockerfiles.outputs.releaseType == 'liquibase-secure-release' && '-SECURE' || '' }}
      dry_run: false
      build_logic_ref: dat-22876-reusables
    secrets: inherit
