name: Publish Liquibase Secure README to Docker Hub

on:
  push:
    paths:
      - 'README-secure.md'
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview README push without updating Docker Hub (for validation runs)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  update-readme:
    uses: liquibase/build-logic/.github/workflows/reusable-docker-readme.yml@dat-22876-reusables
    with:
      target_image: liquibase/liquibase-secure
      readme_path: README-secure.md
      short_description: "Liquibase Secure"
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit
